<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>邮箱监控管理后台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            background: white;
            padding: 20px 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 22px;
            color: #1a1a2e;
        }
        .header .stats {
            display: flex;
            gap: 30px;
        }
        .header .stats span {
            font-size: 14px;
            color: #666;
        }
        .header .stats strong {
            font-size: 18px;
            color: #1a1a2e;
        }
        .main {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 20px;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .card h2 {
            font-size: 16px;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f2f5;
        }
        .card h2 .badge {
            background: #667eea;
            color: white;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            margin-left: 8px;
        }
        /* 邮箱列表 */
        .email-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f0f2f5;
        }
        .email-item:last-child {
            border-bottom: none;
        }
        .email-item .info {
            flex: 1;
        }
        .email-item .info .addr {
            font-size: 14px;
            font-weight: 500;
            color: #333;
        }
        .email-item .info .meta {
            font-size: 12px;
            color: #999;
        }
        .email-item .status {
            font-size: 12px;
            padding: 3px 12px;
            border-radius: 20px;
            margin-right: 10px;
        }
        .email-item .status.active {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .email-item .status.disabled {
            background: #ffebee;
            color: #c62828;
        }
        .email-item .btn-toggle {
            padding: 4px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }
        .email-item .btn-toggle.enable {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .email-item .btn-toggle.disable {
            background: #ffebee;
            color: #c62828;
        }
        .btn-add {
            width: 100%;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-add:hover {
            background: #5a67d8;
        }
        /* 日志表格 */
        .log-table {
            width: 100%;
            font-size: 13px;
            border-collapse: collapse;
        }
        .log-table th {
            text-align: left;
            padding: 10px 8px;
            border-bottom: 2px solid #e0e0e0;
            color: #666;
            font-weight: 600;
        }
        .log-table td {
            padding: 10px 8px;
            border-bottom: 1px solid #f0f2f5;
        }
        .log-table .highlight {
            background: #fff8e1;
        }
        .log-table .code {
            background: #e8f5e9;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
            color: #2e7d32;
        }
        .log-table .no-code {
            color: #999;
            font-size: 12px;
        }
        .filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .filter-bar input,
        .filter-bar select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
        }
        .filter-bar input {
            flex: 1;
        }
        .filter-bar select {
            width: 150px;
        }
        .empty {
            text-align: center;
            padding: 30px;
            color: #999;
        }
        /* 右侧统计 */
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }
        .stat-item {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-item .num {
            font-size: 24px;
            font-weight: bold;
            color: #1a1a2e;
        }
        .stat-item .label {
            font-size: 12px;
            color: #999;
        }
        .refresh-btn {
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .refresh-btn:hover {
            background: #5a67d8;
        }
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 16px;
            width: 360px;
        }
        .login-box h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        .login-box input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .login-box button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        .login-box button:hover {
            background: #5a67d8;
        }
        .login-box .error {
            color: #c62828;
            font-size: 13px;
            text-align: center;
            margin-bottom: 10px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 16px;
            width: 420px;
        }
        .modal-content h3 {
            margin-bottom: 15px;
        }
        .modal-content input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            margin-bottom: 10px;
        }
        .modal-content .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .modal-content .btn-group button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .modal-content .btn-group .confirm {
            background: #667eea;
            color: white;
        }
        .modal-content .btn-group .cancel {
            background: #f0f2f5;
            color: #333;
        }
    </style>
</head>
<body>

    <!-- 登录弹窗 -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2>🔐 管理员登录</h2>
            <div class="error" id="loginError"></div>
            <input type="password" id="adminPassword" placeholder="请输入管理员密码" onkeydown="if(event.key==='Enter') adminLogin()">
            <button onclick="adminLogin()">登录</button>
        </div>
    </div>

    <div class="container" id="mainContent" style="display:none;">
        <!-- 头部 -->
        <div class="header">
            <h1>📬 邮箱监控管理后台</h1>
            <div class="stats">
                <span>📧 邮箱 <strong id="totalEmails">0</strong></span>
                <span>📨 日志 <strong id="totalLogs">0</strong></span>
                <span>⏱️ <strong id="lastUpdate">-</strong></span>
                <button class="refresh-btn" onclick="loadAll()">🔄 刷新</button>
            </div>
        </div>

        <div class="main">
            <!-- 左侧：邮箱管理 -->
            <div>
                <div class="card" style="margin-bottom:20px;">
                    <h2>📧 邮箱管理 <span class="badge">启用/禁用</span></h2>
                    <div id="emailList">
                        <div class="empty">加载中...</div>
                    </div>
                    <button class="btn-add" onclick="showAddModal()">➕ 添加邮箱</button>
                </div>
                <div class="card">
                    <h2>📊 统计</h2>
                    <div class="stat-grid">
                        <div class="stat-item"><div class="num" id="statActive">0</div><div class="label">启用中</div></div>
                        <div class="stat-item"><div class="num" id="statDisabled">0</div><div class="label">已禁用</div></div>
                        <div class="stat-item"><div class="num" id="statTotalQueries">0</div><div class="label">总查询次数</div></div>
                        <div class="stat-item"><div class="num" id="statTodayQueries">0</div><div class="label">今日查询</div></div>
                    </div>
                </div>
            </div>

            <!-- 右侧：邮件日志 -->
            <div class="card">
                <h2>📨 邮件日志 <span class="badge">实时</span></h2>
                <div class="filter-bar">
                    <input type="text" id="searchLog" placeholder="搜索发件人/主题/邮箱..." oninput="filterLogs()">
                    <select id="filterEmail" onchange="filterLogs()">
                        <option value="">所有邮箱</option>
                    </select>
                </div>
                <div style="overflow-x:auto;">
                    <table class="log-table">
                        <thead>
                            <tr>
                                <th>时间</th>
                                <th>邮箱</th>
                                <th>发件人</th>
                                <th>主题</th>
                                <th>验证码</th>
                            </tr>
                        </thead>
                        <tbody id="logBody">
                            <tr><td colspan="5" class="empty">暂无日志</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- 添加邮箱弹窗 -->
    <div class="modal" id="addModal">
        <div class="modal-content">
            <h3>📧 添加邮箱</h3>
            <input type="text" id="newEmail" placeholder="邮箱地址（如：user@qq.com）">
            <input type="text" id="newAuth" placeholder="授权码（16位）">
            <div class="btn-group">
                <button class="confirm" onclick="addEmail()">添加</button>
                <button class="cancel" onclick="closeAddModal()">取消</button>
            </div>
        </div>
    </div>

    <script>
        // ===== 管理员密码 =====
        const ADMIN_PASSWORD = "060910";  // 修改成你自己的密码

        let allLogs = [];
        let allEmails = [];
        let emailStatus = {};  // 存储启用/禁用状态

        // ===== 登录 =====
        function adminLogin() {
            const pwd = document.getElementById('adminPassword').value;
            if (pwd === ADMIN_PASSWORD) {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                loadAll();
            } else {
                document.getElementById('loginError').textContent = '密码错误，请重试';
            }
        }

        // ===== 加载所有数据 =====
        async function loadAll() {
            await loadEmails();
            await loadLogs();
            updateStats();
            updateFilterOptions();
            document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
        }

        // ===== 加载邮箱列表 =====
        async function loadEmails() {
            try {
                const res = await fetch('/admin/emails');
                const data = await res.json();
                allEmails = data.emails || [];
                emailStatus = data.status || {};
                renderEmails();
                document.getElementById('totalEmails').textContent = allEmails.length;
            } catch (e) {
                console.error('加载邮箱失败', e);
            }
        }

        // ===== 渲染邮箱列表 =====
        function renderEmails() {
            const container = document.getElementById('emailList');
            if (!allEmails.length) {
                container.innerHTML = '<div class="empty">暂无邮箱</div>';
                return;
            }
            let html = '';
            allEmails.forEach(email => {
                const status = emailStatus[email] !== false; // 默认启用
                html += `
                    <div class="email-item">
                        <div class="info">
                            <div class="addr">${email}</div>
                            <div class="meta">${status ? '✅ 启用中' : '⛔ 已禁用'}</div>
                        </div>
                        <span class="status ${status ? 'active' : 'disabled'}">${status ? '启用' : '禁用'}</span>
                        <button class="btn-toggle ${status ? 'disable' : 'enable'}" onclick="toggleEmail('${email}')">
                            ${status ? '禁用' : '启用'}
                        </button>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // ===== 切换邮箱状态 =====
        async function toggleEmail(email) {
            const current = emailStatus[email] !== false;
            const newStatus = !current;
            try {
                const res = await fetch('/admin/toggle', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, enabled: newStatus })
                });
                const data = await res.json();
                if (data.success) {
                    emailStatus[email] = newStatus;
                    renderEmails();
                    updateStats();
                } else {
                    alert('操作失败：' + (data.error || '未知错误'));
                }
            } catch (e) {
                alert('请求失败：' + e.message);
            }
        }

        // ===== 加载邮件日志 =====
        async function loadLogs() {
            try {
                const res = await fetch('/admin/logs');
                const data = await res.json();
                allLogs = data.logs || [];
                renderLogs();
                document.getElementById('totalLogs').textContent = allLogs.length;
            } catch (e) {
                console.error('加载日志失败', e);
            }
        }

        // ===== 渲染日志 =====
        function renderLogs(filterEmail = '', searchText = '') {
            const tbody = document.getElementById('logBody');
            let filtered = allLogs;

            if (filterEmail) {
                filtered = filtered.filter(l => l.email === filterEmail);
            }
            if (searchText) {
                const s = searchText.toLowerCase();
                filtered = filtered.filter(l =>
                    (l.sender && l.sender.toLowerCase().includes(s)) ||
                    (l.subject && l.subject.toLowerCase().includes(s)) ||
                    (l.email && l.email.toLowerCase().includes(s))
                );
            }

            if (!filtered.length) {
                tbody.innerHTML = '<tr><td colspan="5" class="empty">暂无日志</td></tr>';
                return;
            }

            let html = '';
            filtered.forEach(log => {
                const code = log.code || '';
                html += `
                    <tr>
                        <td style="font-size:12px;color:#999;">${log.time || '-'}</td>
                        <td style="font-size:13px;">${log.email}</td>
                        <td style="font-size:13px;">${log.sender || '-'}</td>
                        <td style="font-size:13px;">${log.subject || '-'}</td>
                        <td>${code ? `<span class="code">${code}</span>` : '<span class="no-code">-</span>'}</td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }

        // ===== 过滤日志 =====
        function filterLogs() {
            const email = document.getElementById('filterEmail').value;
            const search = document.getElementById('searchLog').value;
            renderLogs(email, search);
        }

        // ===== 更新筛选下拉 =====
        function updateFilterOptions() {
            const select = document.getElementById('filterEmail');
            const current = select.value;
            let html = '<option value="">所有邮箱</option>';
            allEmails.forEach(email => {
                html += `<option value="${email}" ${email === current ? 'selected' : ''}>${email}</option>`;
            });
            select.innerHTML = html;
        }

        // ===== 更新统计 =====
        function updateStats() {
            const active = allEmails.filter(e => emailStatus[e] !== false).length;
            const disabled = allEmails.filter(e => emailStatus[e] === false).length;
            document.getElementById('statActive').textContent = active;
            document.getElementById('statDisabled').textContent = disabled;
            document.getElementById('statTotalQueries').textContent = allLogs.length;
            const today = new Date().toDateString();
            const todayLogs = allLogs.filter(l => {
                const d = new Date(l.time);
                return d.toDateString() === today;
            });
            document.getElementById('statTodayQueries').textContent = todayLogs.length;
        }

        // ===== 添加邮箱 =====
        function showAddModal() {
            document.getElementById('addModal').classList.add('show');
            document.getElementById('newEmail').value = '';
            document.getElementById('newAuth').value = '';
        }

        function closeAddModal() {
            document.getElementById('addModal').classList.remove('show');
        }

        async function addEmail() {
            const email = document.getElementById('newEmail').value.trim();
            const auth = document.getElementById('newAuth').value.trim();
            if (!email || !auth) {
                alert('请填写完整信息');
                return;
            }
            try {
                const res = await fetch('/admin/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, auth })
                });
                const data = await res.json();
                if (data.success) {
                    alert('添加成功！');
                    closeAddModal();
                    loadAll();
                } else {
                    alert('添加失败：' + (data.error || '未知错误'));
                }
            } catch (e) {
                alert('请求失败：' + e.message);
            }
        }

        // 自动刷新（每30秒）
        setInterval(loadAll, 30000);

        // 回车登录
        document.getElementById('adminPassword').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') adminLogin();
        });
    </script>

</body>
</html>
