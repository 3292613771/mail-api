<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>邮箱监控管理后台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            background: white;
            padding: 20px 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .header h1 {
            font-size: 22px;
            color: #1a1a2e;
        }
        .header .stats {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .header .stats span {
            font-size: 14px;
            color: #666;
        }
        .header .stats strong {
            font-size: 18px;
            color: #1a1a2e;
        }
        .main {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 20px;
        }
        @media (max-width: 900px) {
            .main {
                grid-template-columns: 1fr;
            }
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .card h2 {
            font-size: 16px;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f2f5;
        }
        .card h2 .badge {
            background: #667eea;
            color: white;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            margin-left: 8px;
        }
        .search-area {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .search-area input {
            flex: 1;
            padding: 10px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
        }
        .search-area input:focus {
            border-color: #667eea;
        }
        .search-area button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-primary:hover {
            background: #5a67d8;
        }
        .btn-danger {
            background: #ffebee;
            color: #c62828;
        }
        .btn-danger:hover {
            background: #ffcdd2;
        }
        .btn-success {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .btn-success:hover {
            background: #c8e6c9;
        }
        .btn-outline {
            background: #f5f5f5;
            color: #333;
        }
        .btn-outline:hover {
            background: #e0e0e0;
        }
        .filter-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .filter-tabs button {
            padding: 6px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            background: white;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .filter-tabs button.active {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }
        .filter-tabs button:hover:not(.active) {
            border-color: #667eea;
        }
        .filter-tabs button .count {
            font-size: 11px;
            opacity: 0.7;
        }
        .email-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            border-bottom: 1px solid #f0f2f5;
            border-radius: 6px;
            transition: background 0.15s;
        }
        .email-item:hover {
            background: #f8f9fa;
        }
        .email-item:last-child {
            border-bottom: none;
        }
        .email-item .info {
            flex: 1;
            min-width: 0;
        }
        .email-item .info .addr {
            font-size: 14px;
            font-weight: 500;
            color: #333;
            word-break: break-all;
        }
        .email-item .info .meta {
            font-size: 12px;
            color: #999;
        }
        .email-item .status {
            font-size: 12px;
            padding: 3px 12px;
            border-radius: 20px;
            margin-right: 10px;
            white-space: nowrap;
        }
        .email-item .status.active {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .email-item .status.disabled {
            background: #ffebee;
            color: #c62828;
        }
        .email-item .btn-toggle {
            padding: 4px 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            white-space: nowrap;
        }
        .email-item .btn-toggle.enable {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .email-item .btn-toggle.enable:hover {
            background: #c8e6c9;
        }
        .email-item .btn-toggle.disable {
            background: #ffebee;
            color: #c62828;
        }
        .email-item .btn-toggle.disable:hover {
            background: #ffcdd2;
        }
        .email-list-container {
            max-height: 500px;
            overflow-y: auto;
        }
        .email-list-container .empty {
            text-align: center;
            padding: 30px;
            color: #999;
            font-size: 14px;
        }
        .email-list-container .result-count {
            font-size: 13px;
            color: #666;
            padding: 8px 12px;
            background: #f8f9fa;
            border-radius: 6px;
            margin-bottom: 10px;
        }
        .log-table {
            width: 100%;
            font-size: 13px;
            border-collapse: collapse;
        }
        .log-table th {
            text-align: left;
            padding: 10px 8px;
            border-bottom: 2px solid #e0e0e0;
            color: #666;
            font-weight: 600;
            position: sticky;
            top: 0;
            background: white;
        }
        .log-table td {
            padding: 10px 8px;
            border-bottom: 1px solid #f0f2f5;
        }
        .log-table .code {
            background: #e8f5e9;
            padding: 2px 10px;
            border-radius: 4px;
            font-weight: bold;
            color: #2e7d32;
            font-size: 14px;
            letter-spacing: 1px;
        }
        .log-table .no-code {
            color: #999;
            font-size: 12px;
        }
        .filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .filter-bar input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
            min-width: 120px;
        }
        .filter-bar select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
            min-width: 120px;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }
        .stat-item {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-item .num {
            font-size: 24px;
            font-weight: bold;
            color: #1a1a2e;
        }
        .stat-item .label {
            font-size: 12px;
            color: #999;
        }
        .refresh-btn {
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }
        .refresh-btn:hover {
            background: #5a67d8;
        }
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 16px;
            width: 360px;
        }
        .login-box h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        .login-box input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .login-box button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        .login-box button:hover {
            background: #5a67d8;
        }
        .login-box .error {
            color: #c62828;
            font-size: 13px;
            text-align: center;
            margin-bottom: 10px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 16px;
            width: 420px;
        }
        .modal-content h3 {
            margin-bottom: 15px;
        }
        .modal-content input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            margin-bottom: 10px;
        }
        .modal-content .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .modal-content .btn-group button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .modal-content .btn-group .confirm {
            background: #667eea;
            color: white;
        }
        .modal-content .btn-group .cancel {
            background: #f0f2f5;
            color: #333;
        }
        .scrollable-table {
            max-height: 500px;
            overflow-y: auto;
        }
        .scrollable-table thead {
            position: sticky;
            top: 0;
            background: white;
            z-index: 10;
        }
        .highlight-row {
            background: #fff8e1 !important;
        }
        .btn-sm {
            font-size: 12px;
            padding: 4px 10px;
        }
        @media (max-width: 600px) {
            .header .stats {
                font-size: 12px;
                gap: 10px;
            }
            .email-item {
                flex-wrap: wrap;
                gap: 6px;
            }
            .email-item .status {
                margin-right: 0;
            }
            .stat-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>

    <!-- 登录弹窗 -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2>🔐 管理员登录</h2>
            <div class="error" id="loginError"></div>
            <input type="password" id="adminPassword" placeholder="请输入管理员密码" onkeydown="if(event.key==='Enter') adminLogin()">
            <button onclick="adminLogin()">登录</button>
        </div>
    </div>

    <div class="container" id="mainContent" style="display:none;">
        <!-- 头部 -->
        <div class="header">
            <h1>📬 邮箱监控管理后台</h1>
            <div class="stats">
                <span>📧 邮箱 <strong id="totalEmails">0</strong></span>
                <span>📨 日志 <strong id="totalLogs">0</strong></span>
                <span>⏱️ <strong id="lastUpdate">-</strong></span>
                <button class="refresh-btn" onclick="loadAll()">🔄 刷新</button>
                <button class="refresh-btn" style="background:#ff9800;" onclick="showAddModal()">➕ 添加</button>
            </div>
        </div>

        <div class="main">
            <!-- 左侧：邮箱管理 -->
            <div>
                <div class="card" style="margin-bottom:20px;">
                    <h2>📧 邮箱管理 <span class="badge">搜索/筛选</span></h2>
                    
                    <!-- 搜索栏 -->
                    <div class="search-area">
                        <input type="text" id="searchInput" placeholder="输入邮箱搜索（支持模糊匹配）" onkeydown="if(event.key==='Enter') searchEmails()">
                        <button class="btn-primary" onclick="searchEmails()">🔍 搜索</button>
                    </div>
                    
                    <!-- 筛选标签 -->
                    <div class="filter-tabs">
                        <button class="active" data-filter="all" onclick="filterEmails('all', this)">📋 全部 <span class="count" id="countAll">0</span></button>
                        <button data-filter="active" onclick="filterEmails('active', this)">✅ 已启用 <span class="count" id="countActive">0</span></button>
                        <button data-filter="disabled" onclick="filterEmails('disabled', this)">⛔ 已禁用 <span class="count" id="countDisabled">0</span></button>
                    </div>
                    
                    <!-- 邮箱列表 -->
                    <div class="email-list-container" id="emailListContainer">
                        <div class="empty">💡 输入邮箱搜索，或点击上方标签筛选</div>
                    </div>
                </div>

                <!-- 统计 -->
                <div class="card">
                    <h2>📊 统计</h2>
                    <div class="stat-grid">
                        <div class="stat-item"><div class="num" id="statActive">0</div><div class="label">✅ 启用中</div></div>
                        <div class="stat-item"><div class="num" id="statDisabled">0</div><div class="label">⛔ 已禁用</div></div>
                        <div class="stat-item"><div class="num" id="statTotalQueries">0</div><div class="label">📊 总查询</div></div>
                        <div class="stat-item"><div class="num" id="statTodayQueries">0</div><div class="label">📊 今日查询</div></div>
                    </div>
                </div>
            </div>

            <!-- 右侧：邮件日志 -->
            <div class="card">
                <h2>📨 邮件日志 <span class="badge">实时</span></h2>
                <div class="filter-bar">
                    <input type="text" id="searchLog" placeholder="搜索发件人/主题/邮箱..." oninput="filterLogs()">
                    <select id="filterEmail" onchange="filterLogs()">
                        <option value="">所有邮箱</option>
                    </select>
                </div>
                <div class="scrollable-table">
                    <table class="log-table">
                        <thead>
                            <tr>
                                <th style="width:150px;">时间</th>
                                <th style="width:180px;">邮箱</th>
                                <th>发件人</th>
                                <th>主题</th>
                                <th style="width:100px;">验证码</th>
                            </tr>
                        </thead>
                        <tbody id="logBody">
                            <tr><td colspan="5" class="empty">暂无日志</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- 添加邮箱弹窗 -->
    <div class="modal" id="addModal">
        <div class="modal-content">
            <h3>📧 添加邮箱</h3>
            <input type="text" id="newEmail" placeholder="邮箱地址（如：user@qq.com）">
            <input type="text" id="newAuth" placeholder="授权码（16位）">
            <div class="btn-group">
                <button class="confirm" onclick="addEmail()">添加</button>
                <button class="cancel" onclick="closeAddModal()">取消</button>
            </div>
        </div>
    </div>

    <script>
        // ===== 管理员密码 =====
        const ADMIN_PASSWORD = "060910";

        let allEmails = [];
        let emailStatus = {};
        let allLogs = [];
        let currentFilter = 'all';
        let currentSearchResults = null; // 用于搜索结果

        // ===== 登录 =====
        function adminLogin() {
            const pwd = document.getElementById('adminPassword').value;
            if (pwd === ADMIN_PASSWORD) {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                loadAll();
            } else {
                document.getElementById('loginError').textContent = '密码错误，请重试';
            }
        }

        // ===== 加载所有数据 =====
        async function loadAll() {
            await loadEmails();
            await loadLogs();
            updateStats();
            updateFilterOptions();
            document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
        }

        // ===== 加载邮箱列表 =====
        async function loadEmails() {
            try {
                const res = await fetch('/admin/emails');
                const data = await res.json();
                allEmails = data.emails || [];
                emailStatus = data.status || {};
                
                // 更新计数
                const active = allEmails.filter(e => emailStatus[e] !== false).length;
                const disabled = allEmails.filter(e => emailStatus[e] === false).length;
                document.getElementById('countAll').textContent = allEmails.length;
                document.getElementById('countActive').textContent = active;
                document.getElementById('countDisabled').textContent = disabled;
                document.getElementById('totalEmails').textContent = allEmails.length;
                
                // 如果当前是搜索结果模式，保留搜索结果，否则按筛选显示
                if (currentSearchResults !== null) {
                    renderEmailList(currentSearchResults);
                } else {
                    applyFilter();
                }
            } catch (e) {
                console.error('加载邮箱失败', e);
            }
        }

        // ===== 搜索邮箱 =====
        function searchEmails() {
            const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
            if (!keyword) {
                currentSearchResults = null;
                applyFilter();
                return;
            }
            
            const results = allEmails.filter(e => e.toLowerCase().includes(keyword));
            currentSearchResults = results;
            renderEmailList(results);
            
            const container = document.getElementById('emailListContainer');
            const countHtml = results.length > 0 ? `<div class="result-count">🔍 找到 ${results.length} 个匹配邮箱</div>` : '';
            // renderEmailList 会处理显示，我们只需要确保它被调用
        }

        // ===== 筛选邮箱（全部/已启用/已禁用） =====
        function filterEmails(filter, btn) {
            currentFilter = filter;
            currentSearchResults = null;
            document.getElementById('searchInput').value = '';
            
            // 更新按钮状态
            document.querySelectorAll('.filter-tabs button').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
            
            applyFilter();
        }

        function applyFilter() {
            let filtered = [...allEmails];
            
            if (currentFilter === 'active') {
                filtered = filtered.filter(e => emailStatus[e] !== false);
            } else if (currentFilter === 'disabled') {
                filtered = filtered.filter(e => emailStatus[e] === false);
            }
            // 'all' 不做筛选
            
            renderEmailList(filtered);
        }

        // ===== 渲染邮箱列表 =====
        function renderEmailList(emails) {
            const container = document.getElementById('emailListContainer');
            
            if (!emails || emails.length === 0) {
                const msgs = {
                    'all': '📭 暂无邮箱',
                    'active': '✅ 暂无已启用的邮箱',
                    'disabled': '⛔ 暂无已禁用的邮箱'
                };
                container.innerHTML = `<div class="empty">${msgs[currentFilter] || '📭 暂无邮箱'}</div>`;
                return;
            }
            
            let html = `<div class="result-count">📋 共 ${emails.length} 个邮箱</div>`;
            emails.forEach(email => {
                const status = emailStatus[email] !== false;
                html += `
                    <div class="email-item">
                        <div class="info">
                            <div class="addr">${email}</div>
                            <div class="meta">${status ? '✅ 启用中' : '⛔ 已禁用'}</div>
                        </div>
                        <span class="status ${status ? 'active' : 'disabled'}">${status ? '启用' : '禁用'}</span>
                        <button class="btn-toggle ${status ? 'disable' : 'enable'}" onclick="toggleEmail('${email}')">
                            ${status ? '禁用' : '启用'}
                        </button>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // ===== 切换邮箱状态 =====
        async function toggleEmail(email) {
            const current = emailStatus[email] !== false;
            const newStatus = !current;
            
            if (!confirm(`确定要${newStatus ? '启用' : '禁用'} ${email} 吗？`)) return;
            
            try {
                const res = await fetch('/admin/toggle', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, enabled: newStatus })
                });
                const data = await res.json();
                if (data.success) {
                    emailStatus[email] = newStatus;
                    
                    // 更新计数
                    const active = allEmails.filter(e => emailStatus[e] !== false).length;
                    const disabled = allEmails.filter(e => emailStatus[e] === false).length;
                    document.getElementById('countActive').textContent = active;
                    document.getElementById('countDisabled').textContent = disabled;
                    
                    // 刷新当前列表
                    if (currentSearchResults !== null) {
                        // 如果搜索结果中有这个邮箱，更新它
                        renderEmailList(currentSearchResults);
                    } else {
                        applyFilter();
                    }
                    updateStats();
                } else {
                    alert('操作失败：' + (data.error || '未知错误'));
                }
            } catch (e) {
                alert('请求失败：' + e.message);
            }
        }

        // ===== 加载邮件日志 =====
        async function loadLogs() {
            try {
                const res = await fetch('/admin/logs');
                const data = await res.json();
                allLogs = data.logs || [];
                renderLogs();
                document.getElementById('totalLogs').textContent = allLogs.length;
            } catch (e) {
                console.error('加载日志失败', e);
            }
        }

        // ===== 渲染日志 =====
        function renderLogs(filterEmail = '', searchText = '') {
            const tbody = document.getElementById('logBody');
            let filtered = allLogs;

            if (filterEmail) {
                filtered = filtered.filter(l => l.email === filterEmail);
            }
            if (searchText) {
                const s = searchText.toLowerCase();
                filtered = filtered.filter(l =>
                    (l.sender && l.sender.toLowerCase().includes(s)) ||
                    (l.subject && l.subject.toLowerCase().includes(s)) ||
                    (l.email && l.email.toLowerCase().includes(s))
                );
            }

            if (!filtered.length) {
                tbody.innerHTML = '<tr><td colspan="5" class="empty">暂无日志</td></tr>';
                return;
            }

            let html = '';
            filtered.slice(0, 200).forEach(log => {
                const code = log.code || '';
                html += `
                    <tr>
                        <td style="font-size:12px;color:#999;">${log.time || '-'}</td>
                        <td style="font-size:13px;word-break:break-all;">${log.email}</td>
                        <td style="font-size:13px;">${log.sender || '-'}</td>
                        <td style="font-size:13px;">${log.subject || '-'}</td>
                        <td>${code ? `<span class="code">${code}</span>` : '<span class="no-code">-</span>'}</td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }

        // ===== 过滤日志 =====
        function filterLogs() {
            const email = document.getElementById('filterEmail').value;
            const search = document.getElementById('searchLog').value;
            renderLogs(email, search);
        }

        // ===== 更新筛选下拉 =====
        function updateFilterOptions() {
            const select = document.getElementById('filterEmail');
            const current = select.value;
            let html = '<option value="">所有邮箱</option>';
            allEmails.forEach(email => {
                html += `<option value="${email}" ${email === current ? 'selected' : ''}>${email}</option>`;
            });
            select.innerHTML = html;
        }

        // ===== 更新统计 =====
        function updateStats() {
            const active = allEmails.filter(e => emailStatus[e] !== false).length;
            const disabled = allEmails.filter(e => emailStatus[e] === false).length;
            document.getElementById('statActive').textContent = active;
            document.getElementById('statDisabled').textContent = disabled;
            document.getElementById('statTotalQueries').textContent = allLogs.length;
            
            const today = new Date().toDateString();
            const todayLogs = allLogs.filter(l => {
                const d = new Date(l.time);
                return d.toDateString() === today;
            });
            document.getElementById('statTodayQueries').textContent = todayLogs.length;
        }

        // ===== 添加邮箱 =====
        function showAddModal() {
            document.getElementById('addModal').classList.add('show');
            document.getElementById('newEmail').value = '';
            document.getElementById('newAuth').value = '';
        }

        function closeAddModal() {
            document.getElementById('addModal').classList.remove('show');
        }

        async function addEmail() {
            const email = document.getElementById('newEmail').value.trim();
            const auth = document.getElementById('newAuth').value.trim();
            if (!email || !auth) {
                alert('请填写完整信息');
                return;
            }
            try {
                const res = await fetch('/admin/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, auth })
                });
                const data = await res.json();
                if (data.success) {
                    alert('✅ 添加成功！');
                    closeAddModal();
                    loadAll();
                } else {
                    alert('添加失败：' + (data.error || '未知错误'));
                }
            } catch (e) {
                alert('请求失败：' + e.message);
            }
        }

        // 自动刷新（每30秒）
        setInterval(loadAll, 30000);

        // 回车登录
        document.getElementById('adminPassword').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') adminLogin();
        });
    </script>

</body>
</html>
