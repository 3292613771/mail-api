<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>邮箱查询系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #1a1a2e;
            margin-bottom: 10px;
            font-size: 28px;
            text-align: center;
        }
        .sub {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
            text-align: center;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            outline: none;
        }
        input:focus {
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #5a67d8;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .result {
            margin-top: 30px;
            display: none;
        }
        .mail-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }
        .mail-sender {
            font-weight: bold;
            color: #1a1a2e;
            margin-bottom: 8px;
        }
        .mail-subject {
            color: #666;
            margin-bottom: 12px;
        }
        .mail-code {
            display: inline-block;
            background: #e8f5e9;
            color: #2e7d32;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 12px;
        }
        .mail-content {
            background: white;
            padding: 15px;
            border-radius: 10px;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 400px;
            overflow-y: auto;
        }
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 12px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        .footer {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>📬 邮箱查询系统</h1>
            <div class="sub">输入已绑定的邮箱，查看最新邮件</div>
            
            <div class="input-group">
                <label>📧 邮箱地址</label>
                <input type="text" id="email" placeholder="例如: 123456789@qq.com">
            </div>
            
            <button id="checkBtn" onclick="checkMail()">🔍 查询最新邮件</button>
        </div>
        
        <div id="result" class="result"></div>
        <div class="footer">💡 提示：如果提示"未绑定"，请联系管理员</div>
    </div>

    <script>
        async function checkMail() {
            const email = document.getElementById('email').value.trim();
            
            if (!email) {
                alert('请输入邮箱地址');
                return;
            }
            
            const resultDiv = document.getElementById('result');
            const checkBtn = document.getElementById('checkBtn');
            
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '<div class="loading">⏳ 查询中...</div>';
            checkBtn.disabled = true;
            checkBtn.textContent = '查询中...';
            
            try {
                const response = await fetch('/check', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    resultDiv.innerHTML = `<div class="error">❌ ${data.error}</div>`;
                } else if (data.mails && data.mails.length > 0) {
                    let html = `<div style="margin-bottom:20px;font-weight:bold;">📬 最新${data.mails.length}封邮件</div>`;
                    for (let mail of data.mails) {
                        html += `
                            <div class="mail-item">
                                <div class="mail-sender">📨 ${escapeHtml(mail.sender)}</div>
                                <div class="mail-subject">📝 ${escapeHtml(mail.subject)}</div>
                                ${mail.code ? `<div class="mail-code">🔑 验证码：${mail.code}</div>` : ''}
                                <div class="mail-content">${escapeHtml(mail.content).replace(/\n/g, '<br>')}</div>
                            </div>
                        `;
                    }
                    resultDiv.innerHTML = html;
                } else {
                    resultDiv.innerHTML = '<div class="empty">📭 暂无邮件</div>';
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">❌ 请求失败</div>`;
            } finally {
                checkBtn.disabled = false;
                checkBtn.textContent = '🔍 查询最新邮件';
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        document.getElementById('email').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkMail();
        });
    </script>
</body>
</html>
